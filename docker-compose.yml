services:
  db:
    image: postgres:16-alpine
    container_name: team-bbs-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team_bbs}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  bbs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team-bbs
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      OPENAPI_SCHEME: ${OPENAPI_SCHEME:-http}
      OPENAPI_HOST: ${OPENAPI_HOST:-127.0.0.1}
      OPENAPI_PORT: ${EXTERNAL_PORT:-60080}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/team_bbs}
    depends_on:
      - db
    ports:
      - "${EXTERNAL_PORT:-60080}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
